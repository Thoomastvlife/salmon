<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自助查價系統 - 金幣查台幣版</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .result-item { 
      background: #2a2a2a; 
      padding: 18px; 
      margin: 12px 0; 
      border-radius: 10px; 
      font-size: 18px; 
      color: #e0e0e0;
    }
    .highlight { 
      color: #ff6b6b; 
      font-size: 24px; 
      font-weight: bold; 
    }
    .total {
      background: #1e3a2f;
      color: #a5f3c0;
      font-size: 20px;
      font-weight: bold;
    }
    input {
      background: #333;
      color: white;
      border: 1px solid #555;
    }
  </style>
</head>
<body>
  <main class="container" id="main-container">
   
    <!-- SVG 動態標題 -->
    <div class="svg-title">
      <svg viewBox="0 0 1320 300">
        <symbol id="s-text">
          <text text-anchor="middle" x="50%" y="50%" dy=".35em">
           鮭魚差價系統
          </text>
        </symbol>
        <use xlink:href="#s-text" class="text"></use>
        <use xlink:href="#s-text" class="text"></use>
        <use xlink:href="#s-text" class="text"></use>
        <use xlink:href="#s-text" class="text"></use>
        <use xlink:href="#s-text" class="text"></use>
      </svg>
    </div>
    <p class="lead">輸入金幣數量 → 反推所需台幣（整數版）</p>
    
    <section class="search-area">
      <div id="inputs-container" class="draggable-container">
        <div class="draggable-item">
          <input type="number" class="amount-input" placeholder="輸入金幣數量" min="1000" step="1">
        </div>
      </div>
      <button onclick="addInput()">➕ 新增金幣</button>
      <button onclick="calculate()">計算所有金額</button>
    </section>
    
    <section id="results"></section>
  </main>

  <!-- Modal -->
  <div id="modal-backdrop" class="modal-backdrop" style="display:none;">
    <div id="popup" class="popup">
      <span id="popup-message">請洽官方賴</span>
      <button id="popup-close">✖</button>
    </div>
  </div>

  <script>
    const table = [
      {coins: 1000,   twd: 351},
      {coins: 1500,   twd: 526},
      {coins: 2000,   twd: 702},
      {coins: 3000,   twd: 1034},
      {coins: 4000,   twd: 1379},
      {coins: 5000,   twd: 1724},
      {coins: 6000,   twd: 2068},
      {coins: 7000,   twd: 2413},
      {coins: 8000,   twd: 2758},
      {coins: 9000,   twd: 3101},
      {coins: 10000,  twd: 3446},
      {coins: 15000,  twd: 5165},
      {coins: 20000,  twd: 6885},
      {coins: 25000,  twd: 8600},
      {coins: 30000,  twd: 10313},
      {coins: 40000,  twd: 13750},
      {coins: 45000,  twd: 15464},
      {coins: 50000,  twd: 17182},
      {coins: 60000,  twd: 20583},
      {coins: 80000,  twd: 27425},
      {coins: 100000, twd: 34247},
      {coins: 120000, twd: 41026},
      {coins: 150000, twd: 51195},
      {coins: 175000, twd: 59727},
      {coins: 200000, twd: 68143},
      {coins: 300000, twd: 101798}
    ];

    function getTwd(coins) {
      let closest = table[0];
      let minDiff = Math.abs(table[0].coins - coins);
      for (let item of table) {
        const diff = Math.abs(item.coins - coins);
        if (diff < minDiff) {
          minDiff = diff;
          closest = item;
        }
      }
      return closest.twd;
    }

    function showModal() {
      document.getElementById('modal-backdrop').style.display = 'flex';
    }

    document.getElementById('popup-close').addEventListener('click', () => {
      document.getElementById('modal-backdrop').style.display = 'none';
    });

    function addInput() {
      const container = document.getElementById('inputs-container');
      const newItem = document.createElement('div');
      newItem.className = 'draggable-item';
      newItem.innerHTML = `<input type="number" class="amount-input" placeholder="輸入金幣數量" min="1000" step="1">`;
      container.appendChild(newItem);
    }

    function calculate() {
      const inputs = document.querySelectorAll('.amount-input');
      const resultsContainer = document.getElementById('results');
      resultsContainer.innerHTML = '<h2>計算結果</h2>';

      let totalTwd = 0;
      let valid = true;

      inputs.forEach((input, index) => {
        let coins = parseFloat(input.value);
        
        if (!coins || coins < 1000 || coins > 300000 || !Number.isInteger(coins)) {
          valid = false;
          return;
        }

        const twd = getTwd(coins);
        totalTwd += twd;

        const div = document.createElement('div');
        div.className = 'result-item';
        div.innerHTML = `
          第 ${index+1} 筆：<br>
          🎁 金幣 <span class="highlight">${coins.toLocaleString()}</span> 枚<br>
          💰 需要台幣 <span class="highlight">${twd.toLocaleString()}</span> 元
        `;
        resultsContainer.appendChild(div);
      });

      if (!valid) {
        showModal();
        return;
      }

      if (totalTwd > 0) {
        const totalDiv = document.createElement('div');
        totalDiv.className = 'result-item total';
        totalDiv.innerHTML = `總計所需台幣：${totalTwd.toLocaleString()} 元`;
        resultsContainer.appendChild(totalDiv);
      }
    }
  </script>
</body>
</html>
