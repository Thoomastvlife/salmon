<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自助查價系統 - 金幣查台幣版</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .result-item { 
      background: #2a2a2a; 
      padding: 18px; 
      margin: 12px 0; 
      border-radius: 10px; 
      font-size: 18px; 
      color: #e0e0e0;
      border: 1px solid #444;
    }
    .highlight { 
      color: #ff6b6b; 
      font-size: 24px; 
      font-weight: bold; 
    }
    .total {
      background: #1e3a2f;
      color: #a5f3c0;
      font-size: 20px;
      font-weight: bold;
      border: 1px solid #4ade80;
    }
    input {
      background: #333;
      color: white;
      border: 1px solid #555;
      padding: 12px;
      width: 100%;
      font-size: 18px;
    }
    button {
      padding: 14px;
      font-size: 18px;
      margin: 8px 4px;
    }
    #results h2 {
      color: #fff;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <main class="container" id="main-container">
   
    <div class="svg-title">
      <svg viewBox="0 0 1320 300">
        <symbol id="s-text">
          <text text-anchor="middle" x="50%" y="50%" dy=".35em">
           鮭魚差價系統
          </text>
        </symbol>
        <use xlink:href="#s-text" class="text"></use>
        <use xlink:href="#s-text" class="text"></use>
        <use xlink:href="#s-text" class="text"></use>
        <use xlink:href="#s-text" class="text"></use>
        <use xlink:href="#s-text" class="text"></use>
      </svg>
    </div>
    <p class="lead">輸入金幣數量</p>
    
    <section class="search-area">
      <div id="inputs-container" class="draggable-container">
        <div class="draggable-item">
          <input type="number" class="amount-input" placeholder="輸入金幣數量" min="1000" step="1">
        </div>
      </div>
      <button onclick="addInput()">➕ 新增金幣</button>
      <button onclick="calculate()">計算所有金額</button>
    </section>
    
    <section id="results"></section>
  </main>

  <!-- Modal -->
  <div id="modal-backdrop" class="modal-backdrop" style="display:none;">
    <div id="popup" class="popup">
      <span id="popup-message">請洽官方賴</span>
      <button id="popup-close">✖</button>
    </div>
  </div>

  <script>
    const validCoins = {
      1000: 351, 1500: 526, 2000: 702, 3000: 1034,
      4000: 1379, 5000: 1724, 6000: 2068, 7000: 2413,
      8000: 2758, 9000: 3101, 10000: 3446, 15000: 5165,
      20000: 6885, 25000: 8600, 30000: 10313, 40000: 13750,
      45000: 15464, 50000: 17182, 60000: 20583, 80000: 27425,
      100000: 34247, 120000: 41026, 150000: 51195,
      175000: 59727, 200000: 68143, 300000: 101798
    };

    function showModal() {
      document.getElementById('modal-backdrop').style.display = 'flex';
    }

    document.getElementById('popup-close').addEventListener('click', () => {
      document.getElementById('modal-backdrop').style.display = 'none';
    });

    function addInput() {
      const container = document.getElementById('inputs-container');
      const newItem = document.createElement('div');
      newItem.className = 'draggable-item';
      newItem.innerHTML = `<input type="number" class="amount-input" placeholder="輸入金幣數量" min="1000" step="1">`;
      container.appendChild(newItem);
    }

    function calculate() {
      const inputs = document.querySelectorAll('.amount-input');
      const resultsContainer = document.getElementById('results');
      
      // 清空並重置結果區
      resultsContainer.innerHTML = '<h2>計算結果</h2>';

      let totalTwd = 0;
      let allValid = true;

      inputs.forEach((input, index) => {
        const coinsStr = input.value.trim();
        const coins = parseInt(coinsStr);

        if (!coinsStr || isNaN(coins) || !validCoins[coins]) {
          allValid = false;
          return;
        }

        const twd = validCoins[coins];

        const div = document.createElement('div');
        div.className = 'result-item';
        div.innerHTML = `
          第 ${index+1} 筆：<br>
          🎁 金幣 <span class="highlight">${coins.toLocaleString()}</span> 枚<br>
          💰 需要台幣 <span class="highlight">${twd.toLocaleString()}</span> 元
        `;
        resultsContainer.appendChild(div);

        totalTwd += twd;
      });

      if (!allValid || totalTwd === 0) {
        showModal();
        return;
      }

      // 顯示總計
      const totalDiv = document.createElement('div');
      totalDiv.className = 'result-item total';
      totalDiv.innerHTML = `總計所需台幣：${totalTwd.toLocaleString()} 元`;
      resultsContainer.appendChild(totalDiv);
    }
  </script>
</body>
</html>
